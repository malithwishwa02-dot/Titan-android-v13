<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titan VMOS Pro Standalone</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: min(720px, 92vw);
      background: #111827;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 20px;
    }
    h1 { margin-top: 0; font-size: 24px; }
    .muted { color: #9ca3af; }
    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
    }
    code { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Titan VMOS Pro Standalone</h1>
    <p class="muted">Window is active. Backend binding check:</p>
    <p id="status">Loading...</p>
    <button id="pingBtn">Run Ping</button>
    <p><code id="pingOut"></code></p>
  </div>

  <script src="./main.js"></script>
</body>
</html>
